<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Techcode Student Tracker</title>

<style>

/* ---------- BASIC ---------- */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#0f2027;
color:white;
overflow-x:hidden;
}

/* ---------- NETWORK BACKGROUND ---------- */
#networkBG{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}
/* ---------- TOP TITLE ---------- */
.top-title{
position:fixed;
top:18px;
left:70px;
font-size:22px;
font-weight:bold;
color:#00ffff;
letter-spacing:1px;
z-index:2000;
}
/* ---------- HAMBURGER ---------- */
.menu{
position:fixed;
top:15px;
left:15px;
font-size:28px;
color:#00ffff;
cursor:pointer;
z-index:2000;
}

/* ---------- SIDEBAR ---------- */
.sidebar{
position:fixed;
top:0;
left:-230px;
width:220px;
height:100%;
background:#000;
padding-top:80px;
transition:.4s;
z-index:1500;
}
.congrats{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px #00ffff;
z-index:3000;
animation:popup .4s ease;
}

.congrats h2{
color:#00ffff;
margin-bottom:10px;
}

.congrats button{
margin-top:15px;
padding:10px 20px;
background:#00ffff;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

@keyframes popup{
from{transform:translate(-50%,-60%) scale(.8);opacity:0;}
to{transform:translate(-50%,-50%) scale(1);opacity:1;}
}
.sidebar button{
width:100%;
padding:15px;
background:none;
border:none;
color:#00ffff;
text-align:left;
font-size:18px;
cursor:pointer;
}

.sidebar button:hover{
background:#00ffff;
color:black;
}

.sidebar.open{left:0;}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
z-index:1400;
}

.overlay.show{display:block;}

/* ---------- CONTAINER ---------- */
.container{
max-width:900px;
margin:100px auto;
background:rgba(0,0,0,.75);
padding:35px;
border-radius:15px;
box-shadow:0 0 20px cyan;
}
.total-space{
margin-top:25px;
text-align:center;
color:#00ffff;
}
.hidden{display:none;}

h1,h2{text-align:center;color:#00ffff;margin-bottom:15px}

/* ---------- LOGIN ---------- */
.login-box{
display:flex;
flex-direction:column;
gap:20px;
margin-top:20px;
}

input{
padding:14px;
border-radius:10px;
border:2px solid #00ffff;
background:#021a1f;
color:white;
font-size:16px;
}

button.main{
padding:14px;
background:#00ffff;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

button.main:hover{
background:white;
color:black;
}
.report-info{
margin-bottom:25px;
}

.report-info p{
margin-bottom:15px;
font-size:17px;
letter-spacing:0.5px;
}
/* ---------- ACTIVITY ---------- */
.activity{
background:#012b33;
padding:15px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
}

/* ---------- PROGRESS ---------- */
.progress{
background:#333;
border-radius:10px;
margin-top:20px;
}

.bar{
height:22px;
background:#00ffff;
width:0%;
border-radius:10px;
text-align:center;
color:black;
font-weight:bold;
}

/* ---------- TABLE ---------- */
table{
width:100%;
background:white;
color:black;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid black;
text-align:center;
}

</style>
</head>

<body>

<canvas id="networkBG"></canvas>

<div class="menu" onclick="toggleMenu()">☰</div>
<div class="top-title">
Student Activity Tracker
</div>

<div id="sidebar" class="sidebar">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('login')">Login</button>
<button onclick="showPage('activity')">Activities</button>
<button onclick="showPage('report')">Report</button>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<!-- HOME -->
<div id="home" class="container">
<center>
<img src="https://image2url.com/r2/default/images/1772029030618-c30ce257-4c29-489f-8d24-952cb25b26ed.png" width="200">
<h1>Techcode</h1>
<p>
Techcode helps students track courses, monitor progress
and complete learning activities efficiently.
</p>
</center>
</div>

<!-- LOGIN -->
<div id="login" class="container hidden">
<h2>Student Login</h2>

<div class="login-box">
<input id="name" placeholder="Enter Name">
<input id="reg" placeholder="Register Number">
<button class="main" onclick="login()">Enter</button>
</div>
</div>

<!-- ACTIVITIES -->
<div id="activity" class="container hidden">

<h2 id="welcome"></h2>

<div id="activities"></div>

<div class="progress">
<div id="bar" class="bar">0%</div>
</div>

</div>

<!-- REPORT -->
<div id="report" class="container hidden">

<h2>Final Report</h2>

<div class="report-info">
<p><b>Name :</b> <span id="rname"></span></p>
<p><b>Register No :</b> <span id="rreg"></span></p>
</div>
<!-- CONGRATS POPUP -->
<div id="congratsBox" class="congrats hidden">
<h2>🎉 Congratulations </h2>
<p>You have completed all courses!</p>
<button onclick="closeCongrats()">Awesome!</button>
</div>

<table>
<tr>
<th>S.No</th>
<th>Course</th>
<th>Status</th>
</tr>
<tbody id="reportBody"></tbody>
</table>

<h3 id="total" class="total-space"></h3>

</div>

<script>

/* ---------- MENU ---------- */
function toggleMenu(){
sidebar.classList.toggle("open");
overlay.classList.toggle("show");
}

function showPage(id){
document.querySelectorAll(".container")
.forEach(p=>p.classList.add("hidden"));

document.getElementById(id).classList.remove("hidden");
toggleMenu();

if(id==="report") loadReport();
}

/* ---------- LOGIN ---------- */
let user={};

function login(){

const name=document.getElementById("name").value.trim();
const reg=document.getElementById("reg").value.trim();

if(!name||!reg){
alert("Enter Name and Register Number");
return;
}

user.name=name;
user.reg=reg;

localStorage.setItem("name",name);
localStorage.setItem("reg",reg);

welcome.innerText="Welcome "+name;

showPage("activity");
loadActivities();
}

/* ---------- COURSES ---------- */
const courses=[
"HTML Basics",
"CSS Styling",
"JavaScript",
"Mini Project",
"Assignment",
"Feedback"
];

let status=JSON.parse(localStorage.getItem("status"))||{};

function loadActivities(){

activities.innerHTML="";

courses.forEach((c,i)=>{

let done=status[c]==="Completed";

activities.innerHTML+=`
<div class="activity">
${c}
<input type="checkbox"
${done?"checked":""}
onchange="toggle(${i})">
</div>`;
});

updateProgress();
}

function toggle(i){
let c=courses[i];
status[c]=status[c]==="Completed"?"Pending":"Completed";
localStorage.setItem("status",JSON.stringify(status));
loadActivities();
}

/* ---------- PROGRESS ---------- */
function updateProgress(){

let done = 0;

/* COUNT COMPLETED COURSES */
courses.forEach(c=>{
if(status[c] === "Completed"){
done++;
}
});

let percent = Math.round(done / courses.length * 100);

bar.style.width = percent + "%";
bar.innerText = percent + "%";

/* SHOW CONGRATS ONLY WHEN ALL DONE */
if(done === courses.length){

if(!localStorage.getItem("congratsShown")){
showCongrats();
localStorage.setItem("congratsShown","yes");
}

}else{

/* RESET WHEN ANY COURSE BECOMES PENDING */
localStorage.removeItem("congratsShown");
closeCongrats();
}
}
/* ---------- REPORT ---------- */
function loadReport(){

rname.innerText=localStorage.getItem("name");
rreg.innerText=localStorage.getItem("reg");

reportBody.innerHTML="";

let completed=0;

courses.forEach((c,i)=>{

let s=status[c]||"Pending";
if(s==="Completed") completed++;

reportBody.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${c}</td>
<td>${s==="Completed"?"✅ Completed":"❌ Pending"}</td>
</tr>`;
});

total.innerText=`Completed ${completed}/${courses.length}`;
}

/* ---------- NETWORK ANIMATION ---------- */
const canvas=document.getElementById("networkBG");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let dots=[];

for(let i=0;i<45;i++)
dots.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.6,
vy:(Math.random()-0.5)*0.6
});

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

dots.forEach(d=>{
d.x+=d.vx;
d.y+=d.vy;

if(d.x<0||d.x>canvas.width)d.vx*=-1;
if(d.y<0||d.y>canvas.height)d.vy*=-1;

ctx.beginPath();
ctx.arc(d.x,d.y,2,0,Math.PI*2);
ctx.fillStyle="#00ffff";
ctx.fill();
});

for(let i=0;i<dots.length;i++){
for(let j=i+1;j<dots.length;j++){
let dx=dots[i].x-dots[j].x;
let dy=dots[i].y-dots[j].y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){
ctx.strokeStyle="rgba(0,255,255,.2)";
ctx.beginPath();
ctx.moveTo(dots[i].x,dots[i].y);
ctx.lineTo(dots[j].x,dots[j].y);
ctx.stroke();
}
}
}

requestAnimationFrame(animate);
}
animate();

</script>
<script>
  function showCongrats(){

document.getElementById("congratsBox")
.classList.remove("hidden");

confetti({
particleCount:180,
spread:90,
origin:{y:0.6}
});
}

function closeCongrats(){
document.getElementById("congratsBox")
.classList.add("hidden");
}
</script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
